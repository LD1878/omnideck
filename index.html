<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Chaser V4: Synthwave Protocol</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100vw; height: 100vh;
            background-color: #050508;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: #fff;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            transition: filter 0.2s ease-out;
        }

        body.inverted { filter: invert(1) hue-rotate(180deg); }

        @keyframes shake {
            0% { transform: translate(10px, 10px) rotate(0deg); }
            20% { transform: translate(-10px, -5px) rotate(-1deg); }
            40% { transform: translate(5px, 10px) rotate(1deg); }
            60% { transform: translate(-10px, 5px) rotate(0deg); }
            80% { transform: translate(10px, -10px) rotate(-1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        body.shaking { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; }

        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; z-index: 10; pointer-events: none;
        }

        #game-canvas { display: block; width: 100vw; height: 100vh; }

        /* === UI SCREENS === */
        #ui-layer {
            position: absolute; top: 20px; left: 20px;
            z-index: 5; pointer-events: none; transition: all 0.3s;
        }

        #ui-layer.dilated .score-board { border-color: #ff0055; box-shadow: 0 0 30px rgba(255, 0, 85, 0.6); }
        #ui-layer.dilated h1 { color: #ff0055; text-shadow: 0 0 10px #ff0055; }

        .score-board {
            background: rgba(10, 10, 15, 0.6); backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.3); border-radius: 12px;
            padding: 15px 25px; box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            transition: all 0.3s ease;
        }

        h1 { font-size: 1.2rem; letter-spacing: 2px; color: #00f3ff; text-shadow: 0 0 10px #00f3ff; margin-bottom: 5px; transition: color 0.3s;}
        #score { font-size: 2.5rem; font-weight: bold; color: #fff; text-shadow: 0 0 10px #fff; }

        #status-text {
            font-size: 1rem; color: #fff; margin-top: 10px;
            text-shadow: 0 0 10px #fff; font-weight: bold; letter-spacing: 1px;
            opacity: 0; transition: opacity 0.2s;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5, 5, 10, 0.85); backdrop-filter: blur(5px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; text-align: center;
        }
        
        #game-over { display: none; }
        
        .overlay h2 { font-size: 3rem; margin-bottom: 10px; letter-spacing: 2px; }
        #start-screen h2 { color: #00f3ff; text-shadow: 0 0 20px #00f3ff; }
        #game-over h2 { color: #ff0055; text-shadow: 0 0 20px #ff0055; }
        
        .overlay p { font-size: 1.2rem; margin-bottom: 30px; max-width: 400px; line-height: 1.5; }
        
        button {
            background: rgba(0, 243, 255, 0.1); border: 2px solid #00f3ff;
            color: #00f3ff; padding: 15px 40px; font-weight: bold;
            font-size: 1.2rem; font-family: 'Courier New', Courier, monospace;
            cursor: pointer; border-radius: 8px; transition: all 0.2s;
            text-transform: uppercase; box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }
        button:hover { background: #00f3ff; color: #000; box-shadow: 0 0 40px #00f3ff; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="start-screen" class="overlay">
        <h2>NEON CHASER</h2>
        <p>Hunt the purple cores. Avoid the red shredders. Grab the white anomalies.</p>
        <button onclick="initSystem()">Initialize System</button>
    </div>

    <div id="game-over" class="overlay">
        <h2>SYSTEM FAILURE</h2>
        <p>Your core was shredded.</p>
        <button onclick="resetGame()">Reboot System</button>
    </div>

    <div id="ui-layer">
        <div class="score-board">
            <h1>DATA CORES</h1>
            <div id="score">0</div>
            <div id="status-text">INVERSION ACTIVE</div>
        </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('game-over');
        const startScreenEl = document.getElementById('start-screen');
        const uiLayer = document.getElementById('ui-layer');
        const statusText = document.getElementById('status-text');

        let width, height, animationId;
        let score = 0;
        let gameActive = false;
        
        // Mechanics
        let timeScale = 1;
        let isInverted = false;
        let inversionTimer = null;
        let nextPowerCoreScore = 100;

        // === PROCEDURAL AUDIO ENGINE ===
        let audioCtx;
        let isAudioPlaying = false;

        function initAudio() {
            // Wake up the browser's audio engine
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            isAudioPlaying = true;
            scheduleBeat();
        }

        function playSynthPluck() {
            if (!audioCtx || !gameActive) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            // Sawtooth wave for that gritty retro sound
            osc.type = 'sawtooth';
            
            // Pluck envelope: sharp attack, quick decay
            const now = audioCtx.currentTime;
            
            // Frequency drops rapidly like a kick drum
            osc.frequency.setValueAtTime(100, now);
            osc.frequency.exponentialRampToValueAtTime(10, now + 0.15);

            // Volume snaps to 30%, then fades out
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);

            osc.start(now);
            osc.stop(now + 0.2);
        }

        function scheduleBeat() {
            if (!isAudioPlaying || !gameActive) return;
            
            playSynthPluck();
            
            // Dynamic BPM Math
            let bpm = 90 + (score * 0.5); // Speeds up as you score
            if (bpm > 220) bpm = 220; // Max speed limit
            if (isInverted) bpm = 280; // Overdrive speed!
            if (timeScale < 1) bpm = 50; // Slow matrix heartbeat
            
            const intervalMs = 60000 / bpm;
            setTimeout(scheduleBeat, intervalMs);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // === INPUT TRACKING ===
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        let touchActive = false;
        let touchStartX = 0, touchStartY = 0, touchCurrentX = 0, touchCurrentY = 0;

        canvas.addEventListener('touchstart', e => {
            if (!gameActive) return;
            e.preventDefault(); 
            touchActive = true;
            touchStartX = touchCurrentX = e.touches[0].clientX;
            touchStartY = touchCurrentY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            if (!touchActive || !gameActive) return;
            e.preventDefault();
            touchCurrentX = e.touches[0].clientX;
            touchCurrentY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', e => { e.preventDefault(); touchActive = false; }, { passive: false });

        function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
        function triggerShake() {
            document.body.classList.remove('shaking');
            void document.body.offsetWidth; 
            document.body.classList.add('shaking');
        }

        /* === ENTITIES === */
        class Player {
            constructor() {
                this.x = width / 2; this.y = height / 2;
                this.radius = 15;
                this.vx = 0; this.vy = 0;
                // SOFTER PHYSICS: Lower acceleration, higher friction for drifting
                this.speed = 0.5; 
                this.friction = 0.96;
                this.color = '#00f3ff';
            }
            update() {
                if (touchActive) {
                    const dx = touchCurrentX - touchStartX;
                    const dy = touchCurrentY - touchStartY;
                    const distance = Math.hypot(dx, dy);
                    if (distance > 5) {
                        const force = Math.min(distance, 40) / 40; 
                        const angle = Math.atan2(dy, dx);
                        this.vx += Math.cos(angle) * this.speed * force * timeScale;
                        this.vy += Math.sin(angle) * this.speed * force * timeScale;
                    }
                } else {
                    if (keys.w || keys.ArrowUp) this.vy -= this.speed * timeScale;
                    if (keys.s || keys.ArrowDown) this.vy += this.speed * timeScale;
                    if (keys.a || keys.ArrowLeft) this.vx -= this.speed * timeScale;
                    if (keys.d || keys.ArrowRight) this.vx += this.speed * timeScale;
                }

                this.vx *= this.friction; this.vy *= this.friction;
                this.x += this.vx; this.y += this.vy;

                if (this.x < -this.radius) this.x = width + this.radius;
                if (this.x > width + this.radius) this.x = -this.radius;
                if (this.y < -this.radius) this.y = height + this.radius;
                if (this.y > height + this.radius) this.y = -this.radius;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 20; ctx.shadowColor = this.color;
                ctx.fill(); ctx.shadowBlur = 0; 
            }
        }

        class Enemy {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.radius = 18;
                this.speed = Math.random() * 1.5 + 1; 
                this.color = '#ff0055';
                this.rotation = Math.random() * Math.PI; // For the saw blade effect
            }
            update() {
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                const direction = isInverted ? -1 : 1; 
                const currentSpeed = isInverted ? this.speed * 1.2 : this.speed;

                this.x += Math.cos(angle) * currentSpeed * direction * timeScale;
                this.y += Math.sin(angle) * currentSpeed * direction * timeScale;
                
                // Spin violently
                this.rotation += 0.1 * currentSpeed * direction * timeScale;

                if (this.x < -this.radius) this.x = width + this.radius;
                if (this.x > width + this.radius) this.x = -this.radius;
                if (this.y < -this.radius) this.y = height + this.radius;
                if (this.y > height + this.radius) this.y = -this.radius;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // DRAW A SHREDDER (Spiked Star)
                ctx.beginPath();
                const spikes = 8;
                const outerRadius = this.radius + 4;
                const innerRadius = this.radius - 6;
                
                for(let i = 0; i < spikes * 2; i++) {
                    const radius = i % 2 === 0 ? outerRadius : innerRadius;
                    const angle = (i * Math.PI) / spikes;
                    if(i === 0) ctx.moveTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
                    else ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
                ctx.closePath();
                
                const activeColor = isInverted ? '#00f3ff' : this.color;
                ctx.strokeStyle = activeColor; ctx.lineWidth = 3;
                ctx.fillStyle = 'rgba(20, 0, 10, 0.5)';
                ctx.shadowBlur = 15; ctx.shadowColor = activeColor;
                
                ctx.fill(); ctx.stroke();
                ctx.restore();
            }
        }

        class Dot {
            constructor() {
                this.radius = 8;
                this.x = Math.random() * (width - 40) + 20;
                this.y = Math.random() * (height - 40) + 20;
                this.color = '#b000ff';
                this.pulse = 0;
            }
            draw() {
                this.pulse += 0.1 * timeScale;
                const currentRadius = this.radius + Math.sin(this.pulse) * 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        class PowerCore {
            constructor() {
                this.radius = 12;
                this.x = Math.random() * (width - 60) + 30;
                this.y = Math.random() * (height - 60) + 30;
                this.color = '#ffffff';
                this.pulse = 0;
            }
            draw() {
                this.pulse += 0.2 * timeScale;
                const currentRadius = this.radius + Math.sin(this.pulse) * 4;
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 30; ctx.shadowColor = this.color;
                ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.radius = Math.random() * 3 + 1;
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * velocity;
                this.vy = Math.sin(angle) * velocity;
                this.color = color;
                this.alpha = 1;
            }
            update() {
                this.x += this.vx * timeScale; this.y += this.vy * timeScale;
                this.alpha -= 0.02 * timeScale; 
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        let player;
        let enemies = [];
        let dots = [];
        let powerCores = [];
        let particles = [];

        function spawnEnemy() {
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? -30 : width + 30; y = Math.random() * height;
            } else {
                x = Math.random() * width; y = Math.random() < 0.5 ? -30 : height + 30;
            }
            enemies.push(new Enemy(x, y));
        }

        function createExplosion(x, y, color, count) {
            for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color));
        }

        function triggerInversion() {
            isInverted = true;
            document.body.classList.add('inverted');
            statusText.style.opacity = 1;
            triggerShake();
            if (inversionTimer) clearTimeout(inversionTimer);
            inversionTimer = setTimeout(() => {
                isInverted = false;
                document.body.classList.remove('inverted');
                statusText.style.opacity = 0;
            }, 6000);
        }

        // Reduced footprint joystick
        function drawJoystick() {
            if (!touchActive) return;
            
            const maxRadius = 30; // Smaller base
            
            // Faint, ghost-like base
            ctx.beginPath();
            ctx.arc(touchStartX, touchStartY, maxRadius, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.15)'; // Highly transparent
            ctx.lineWidth = 1;
            ctx.stroke();

            const dx = touchCurrentX - touchStartX;
            const dy = touchCurrentY - touchStartY;
            const distance = Math.hypot(dx, dy);
            const angle = Math.atan2(dy, dx);
            const visualDist = Math.min(distance, maxRadius);
            
            const knobX = touchStartX + Math.cos(angle) * visualDist;
            const knobY = touchStartY + Math.sin(angle) * visualDist;

            // Smaller, faint knob
            ctx.beginPath();
            ctx.arc(knobX, knobY, 10, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 243, 255, 0.3)'; // Semi-transparent
            ctx.fill();
        }

        function animate() {
            if (!gameActive) return;
            animationId = requestAnimationFrame(animate);

            let closestEnemyDist = Infinity;
            enemies.forEach(e => {
                let d = dist(player.x, player.y, e.x, e.y);
                if (d < closestEnemyDist) closestEnemyDist = d;
            });

            if (closestEnemyDist < 100 && !isInverted) {
                timeScale = 0.25; uiLayer.classList.add('dilated');
            } else {
                timeScale = 1; uiLayer.classList.remove('dilated');
            }

            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(5, 5, 8, 0.3)'; 
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'lighter';

            player.update();
            player.draw();

            particles.forEach((p, index) => {
                if (p.alpha <= 0) particles.splice(index, 1);
                else { p.update(); p.draw(); }
            });

            dots.forEach((dot, index) => {
                dot.draw();
                if (dist(player.x, player.y, dot.x, dot.y) < player.radius + dot.radius) {
                    dots.splice(index, 1);
                    score += 10; scoreEl.innerText = score;
                    createExplosion(dot.x, dot.y, dot.color, 15);
                    dots.push(new Dot());
                    if (score % 50 === 0) spawnEnemy();
                    if (score >= nextPowerCoreScore) {
                        powerCores.push(new PowerCore());
                        nextPowerCoreScore += 100;
                    }
                }
            });

            powerCores.forEach((core, index) => {
                core.draw();
                if (dist(player.x, player.y, core.x, core.y) < player.radius + core.radius) {
                    powerCores.splice(index, 1);
                    createExplosion(core.x, core.y, '#ffffff', 30);
                    triggerInversion();
                }
            });

            enemies.forEach((enemy, index) => {
                enemy.update();
                enemy.draw();
                if (dist(player.x, player.y, enemy.x, enemy.y) < player.radius + enemy.radius - 5) {
                    if (isInverted) {
                        createExplosion(enemy.x, enemy.y, enemy.color, 40);
                        enemies.splice(index, 1);
                        score += 50; scoreEl.innerText = score;
                        triggerShake();
                        setTimeout(spawnEnemy, 2000);
                    } else {
                        gameActive = false; touchActive = false;
                        createExplosion(player.x, player.y, player.color, 50);
                        document.body.classList.remove('inverted');
                        triggerShake();
                        setTimeout(() => { gameOverEl.style.display = 'flex'; }, 500);
                    }
                }
            });

            drawJoystick();
        }

        // Called by the INITIALIZE button
        function initSystem() {
            startScreenEl.style.display = 'none';
            if(!audioCtx) initAudio(); // Start the Web Audio API
            resetGame();
        }

        function resetGame() {
            score = 0; scoreEl.innerText = score;
            nextPowerCoreScore = 100;
            player = new Player();
            enemies = [];
            dots = [new Dot()];
            powerCores = [];
            particles = [];
            gameActive = true;
            touchActive = false;
            isInverted = false;
            document.body.classList.remove('inverted');
            uiLayer.classList.remove('dilated');
            statusText.style.opacity = 0;
            if (inversionTimer) clearTimeout(inversionTimer);
            gameOverEl.style.display = 'none';
            
            spawnEnemy();
            animate();
            
            // Restart audio loop if it died
            if(audioCtx && !isAudioPlaying) {
                isAudioPlaying = true;
                scheduleBeat();
            }
        }
    </script>
</body>
</html>
