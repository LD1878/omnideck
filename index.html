<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Omni-Deck V2</title>
    <style>
        /* === 1. RESET & FOUNDATION === */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100vw; height: 100vh;
            overflow: hidden;
            background-color: #03030b;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
        }

        /* === 2. THE PARTICLE CANVAS === */
        #particle-canvas {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0; pointer-events: none;
        }

        /* === 3. THE WIDESCREEN GRID (3x2) === */
        .omni-deck {
            position: relative; z-index: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 1.5rem;
            width: 100vw; height: 100vh;
            padding: 1.5rem;
            perspective: 2500px; 
        }

        /* === 4. NEON GLASSMORPHISM CARDS === */
        .card {
            position: relative;
            border-radius: 20px;
            padding: 1rem;
            background: rgba(20, 20, 35, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-style: preserve-3d;
            animation: neon-breathe 4s infinite alternate ease-in-out;
            display: flex; flex-direction: column;
        }

        /* Staggered animations so the grid feels alive */
        .card:nth-child(2) { animation-delay: -0.5s; }
        .card:nth-child(3) { animation-delay: -1s; }
        .card:nth-child(4) { animation-delay: -1.5s; }
        .card:nth-child(5) { animation-delay: -2s; }
        .card:nth-child(6) { animation-delay: -2.5s; }

        @keyframes neon-breathe {
            0% {
                box-shadow: 0 0 10px rgba(0, 243, 255, 0.1), inset 0 0 15px rgba(255, 0, 255, 0.1);
                border-color: rgba(0, 243, 255, 0.3);
            }
            100% {
                box-shadow: 0 0 25px rgba(255, 0, 255, 0.3), inset 0 0 25px rgba(0, 243, 255, 0.2);
                border-color: rgba(255, 0, 255, 0.5);
            }
        }

        /* Label styling */
        .card-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00f3ff;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 5px #00f3ff;
            pointer-events: none;
            transform: translateZ(40px); /* Pops the text out in 3D */
        }

        /* === 5. IFRAME STYLING === */
        .card iframe {
            flex-grow: 1;
            width: 100%; height: 100%;
            border: none; border-radius: 12px;
            background: #000;
            transform: translateZ(20px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        /* === 6. THE NATIVE CYBER RADAR (Quadrant 6) === */
        .native-core {
            flex-grow: 1;
            width: 100%; height: 100%;
            border-radius: 12px;
            background: #050510;
            transform: translateZ(20px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border: 1px solid rgba(255, 0, 255, 0.2);
            position: relative; overflow: hidden;
        }

        .radar {
            width: 150px; height: 150px;
            border-radius: 50%;
            border: 2px solid rgba(0, 243, 255, 0.5);
            position: relative;
            background: 
                linear-gradient(rgba(0, 243, 255, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.2) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center;
        }

        .radar::before {
            content: ''; position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 70%, rgba(0, 243, 255, 0.8) 100%);
            animation: spin 3s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .telemetry {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #ff00ff;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="omni-deck">
        
        <div class="card">
            <div class="card-label">SYS.01 // GLOBAL WIND</div>
            <iframe src="https://earth.nullschool.net/" title="Earth"></iframe>
        </div>

        <div class="card">
            <div class="card-label">SYS.02 // FLUID DYNAMICS</div>
            <iframe src="https://paveldogreat.github.io/WebGL-Fluid-Simulation/" title="Fluid Sim"></iframe>
        </div>

        <div class="card">
            <div class="card-label">SYS.03 // THREAT RADAR</div>
            <iframe src="https://cybermap.kaspersky.com/en/widget/dynamic/dark" title="Cyber Map"></iframe>
        </div>

        <div class="card">
            <div class="card-label">SYS.04 // PARTICLE PHYSICS</div>
            <iframe src="https://sandspiel.club/" title="Sandspiel"></iframe>
        </div>

        <div class="card">
            <div class="card-label">SYS.05 // AUDIO FEED</div>
            <iframe src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1&mute=1&controls=0&loop=1&playlist=jfKfPfyJRdk" title="LoFi Radio"></iframe>
        </div>

        <div class="card">
            <div class="card-label">SYS.06 // LOCAL TELEMETRY</div>
            <div class="native-core">
                <div class="radar"></div>
                <div class="telemetry">
                    <div id="clock">00:00:00</div>
                    <div id="mouse-coords">X: 000 | Y: 000</div>
                    <div>STATUS: OPTIMAL</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        /* === 1. 3D HOVER LOGIC === */
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const rotateX = ((y - centerY) / centerY) * -5; 
                const rotateY = ((x - centerX) / centerX) * 5;

                card.style.transition = 'none';
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.03, 1.03, 1.03)`;
            });

            card.addEventListener('mouseleave', () => {
                card.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1)';
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
            });
        });

        /* === 2. LOCAL TELEMETRY LOGIC (Quadrant 6) === */
        const clockEl = document.getElementById('clock');
        const coordsEl = document.getElementById('mouse-coords');

        // Update Clock
        setInterval(() => {
            const now = new Date();
            clockEl.innerText = now.toLocaleTimeString('en-US', { hour12: false }) + ':' + String(now.getMilliseconds()).padStart(3, '0').slice(0, 2);
        }, 50);

        // Update Mouse Tracking globally
        window.addEventListener('mousemove', (e) => {
            coordsEl.innerText = `X: ${String(e.clientX).padStart(4, '0')} | Y: ${String(e.clientY).padStart(4, '0')}`;
        });

        /* === 3. PARTICLE SYSTEM === */
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 1) * 0.8;
                this.color = Math.random() > 0.5 ? 'rgba(0, 243, 255, 0.4)' : 'rgba(255, 0, 255, 0.4)';
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                if (this.y > height) this.y = 0;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
            }
        }

        for (let i = 0; i < 120; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
