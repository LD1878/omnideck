<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Chaser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100vw; height: 100vh;
            background-color: #050508;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: #fff;
        }

        /* CRT Scanline Overlay */
        body::after {
            content: "";
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 10; pointer-events: none;
        }

        #game-canvas {
            display: block; width: 100vw; height: 100vh;
        }

        /* Glassmorphism UI */
        #ui-layer {
            position: absolute; top: 20px; left: 20px;
            z-index: 5; pointer-events: none;
        }

        .score-board {
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 12px;
            padding: 15px 25px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        h1 { font-size: 1.2rem; letter-spacing: 2px; color: #00f3ff; text-shadow: 0 0 10px #00f3ff; margin-bottom: 5px; }
        #score { font-size: 2.5rem; font-weight: bold; color: #fff; text-shadow: 0 0 10px #fff; }

        #game-over {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; z-index: 20;
            background: rgba(20, 0, 10, 0.8);
            padding: 40px; border-radius: 20px;
            border: 2px solid #ff0055;
            box-shadow: 0 0 50px rgba(255, 0, 85, 0.5);
            display: none;
        }
        
        #game-over h2 { color: #ff0055; font-size: 3rem; margin-bottom: 10px; text-shadow: 0 0 20px #ff0055;}
        #game-over p { font-size: 1.2rem; margin-bottom: 20px; }
        
        button {
            background: transparent; border: 2px solid #00f3ff;
            color: #00f3ff; padding: 10px 30px;
            font-size: 1.2rem; font-family: 'Courier New', Courier, monospace;
            cursor: pointer; border-radius: 8px;
            transition: all 0.2s; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }
        button:hover { background: #00f3ff; color: #000; box-shadow: 0 0 30px #00f3ff; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="score-board">
            <h1>DATA CORES</h1>
            <div id="score">0</div>
        </div>
    </div>

    <div id="game-over">
        <h2>SYSTEM FAILURE</h2>
        <p>HUNTER-KILLERS INTERCEPTED YOU.</p>
        <button onclick="resetGame()">Reboot System</button>
    </div>

    <canvas id="game-canvas"></canvas>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('game-over');

        let width, height;
        let animationId;
        let score = 0;
        let gameActive = true;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Input Tracking
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        // Math helper
        function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

        /* === ENTITY CLASSES === */
        class Player {
            constructor() {
                this.x = width / 2; this.y = height / 2;
                this.radius = 15;
                this.vx = 0; this.vy = 0;
                this.speed = 0.6; this.friction = 0.92;
                this.color = '#00f3ff';
            }
            update() {
                // Movement logic
                if (keys.w || keys.ArrowUp) this.vy -= this.speed;
                if (keys.s || keys.ArrowDown) this.vy += this.speed;
                if (keys.a || keys.ArrowLeft) this.vx -= this.speed;
                if (keys.d || keys.ArrowRight) this.vx += this.speed;

                this.vx *= this.friction; this.vy *= this.friction;
                this.x += this.vx; this.y += this.vy;

                // Wrap around screen (The Madness!)
                if (this.x < -this.radius) this.x = width + this.radius;
                if (this.x > width + this.radius) this.x = -this.radius;
                if (this.y < -this.radius) this.y = height + this.radius;
                if (this.y > height + this.radius) this.y = -this.radius;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 20; ctx.shadowColor = this.color;
                ctx.fill(); ctx.shadowBlur = 0; // Reset shadow
            }
        }

        class Enemy {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.radius = 18;
                // Enemies start slow but we can increase speed later
                this.speed = Math.random() * 1.5 + 1; 
                this.color = '#ff0055';
            }
            update() {
                // Basic AI: Constantly move towards player
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;
            }
            draw() {
                ctx.beginPath();
                // Draw a spiked/square enemy for contrast
                ctx.rect(this.x - this.radius, this.y - this.radius, this.radius*2, this.radius*2);
                ctx.strokeStyle = this.color; ctx.lineWidth = 3;
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.stroke(); ctx.shadowBlur = 0;
            }
        }

        class Dot {
            constructor() {
                this.radius = 8;
                this.x = Math.random() * (width - 40) + 20;
                this.y = Math.random() * (height - 40) + 20;
                this.color = '#b000ff';
                this.pulse = 0;
            }
            draw() {
                this.pulse += 0.1;
                const currentRadius = this.radius + Math.sin(this.pulse) * 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.fill(); ctx.shadowBlur = 0;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.radius = Math.random() * 3 + 1;
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 5 + 2;
                this.vx = Math.cos(angle) * velocity;
                this.vy = Math.sin(angle) * velocity;
                this.color = color;
                this.alpha = 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.alpha -= 0.02; // Fade out
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        /* === GAME STATE === */
        let player = new Player();
        let enemies = [];
        let dots = [new Dot()];
        let particles = [];

        function spawnEnemy() {
            // Spawn enemy far away from player
            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? -30 : width + 30;
                y = Math.random() * height;
            } else {
                x = Math.random() * width;
                y = Math.random() < 0.5 ? -30 : height + 30;
            }
            enemies.push(new Enemy(x, y));
        }

        function createExplosion(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        /* === THE ENGINE === */
        function animate() {
            if (!gameActive) return;
            animationId = requestAnimationFrame(animate);

            // Additive blending for that neon glow effect + motion blur trail
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(5, 5, 8, 0.3)'; 
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'lighter';

            player.update();
            player.draw();

            // Handle Particles
            particles.forEach((p, index) => {
                if (p.alpha <= 0) particles.splice(index, 1);
                else { p.update(); p.draw(); }
            });

            // Handle Dots
            dots.forEach((dot, index) => {
                dot.draw();
                // Collision: Player eats Dot
                if (dist(player.x, player.y, dot.x, dot.y) < player.radius + dot.radius) {
                    dots.splice(index, 1);
                    score += 10;
                    scoreEl.innerText = score;
                    createExplosion(dot.x, dot.y, dot.color, 15);
                    
                    // Spawn a new dot
                    dots.push(new Dot());
                    
                    // The Madness Escalates: Spawn a new enemy every 50 points
                    if (score % 50 === 0) spawnEnemy();
                }
            });

            // Handle Enemies
            enemies.forEach(enemy => {
                enemy.update();
                enemy.draw();
                // Collision: Enemy hits Player
                if (dist(player.x, player.y, enemy.x, enemy.y) < player.radius + enemy.radius - 5) {
                    gameActive = false;
                    createExplosion(player.x, player.y, player.color, 50);
                    setTimeout(() => { gameOverEl.style.display = 'block'; }, 500);
                }
            });
        }

        function resetGame() {
            score = 0; scoreEl.innerText = score;
            player = new Player();
            enemies = [];
            dots = [new Dot()];
            particles = [];
            gameActive = true;
            gameOverEl.style.display = 'none';
            // Start with one enemy
            spawnEnemy();
            animate();
        }

        // Boot Sequence
        resetGame();

    </script>
</body>
</html>
