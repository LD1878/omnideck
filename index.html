<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Deck V4: Aurora Protocol</title>
    <style>
        /* === 1. FOUNDATION & SCANLINES === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html {
            width: 100vw; height: 100vh;
            background-color: #030008; /* Deepest purple/black base */
            font-family: 'Courier New', monospace;
            color: #fff;
            overflow: hidden;
        }

        /* Subtle CRT Scanlines */
        body::after {
            content: "";
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 9999; pointer-events: none;
        }

        /* === 2. THE MAGICAL AURORA BACKGROUND === */
        .magical-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; overflow: hidden;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.7;
            animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Deep Neon Cyan */
        .orb-1 {
            width: 50vw; height: 50vw;
            background: #00f3ff;
            top: -10vw; left: -10vw;
            animation-delay: 0s;
        }
        /* Electric Magenta */
        .orb-2 {
            width: 60vw; height: 60vw;
            background: #ff00ff;
            bottom: -20vw; right: -10vw;
            animation-duration: 25s;
        }
        /* Ultraviolet Purple */
        .orb-3 {
            width: 45vw; height: 45vw;
            background: #7000ff;
            top: 20vw; left: 30vw;
            animation-duration: 30s;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(15vw, 10vh) scale(1.1); }
            66% { transform: translate(-10vw, 20vh) scale(0.9); }
            100% { transform: translate(20vw, -15vh) scale(1.2); }
        }

        /* === 3. BENTO BOX GRID === */
        .bento-grid {
            position: relative; z-index: 10;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 1.5rem;
            width: 100vw; height: 100vh;
            padding: 2rem;
            perspective: 2000px;
        }

        .card:nth-child(1) { grid-column: 1 / 2; grid-row: 1 / 3; }
        .card:nth-child(2) { grid-column: 2 / 4; grid-row: 1 / 2; }
        .card:nth-child(3) { grid-column: 2 / 3; grid-row: 2 / 3; }
        .card:nth-child(4) { grid-column: 3 / 4; grid-row: 2 / 3; }

        /* === 4. ADVANCED GLASSMORPHISM === */
        .card {
            position: relative;
            /* Extra transparent base to let the magic background shine through */
            background: rgba(10, 10, 15, 0.2); 
            border-radius: 16px;
            padding: 2px; 
            transform-style: preserve-3d;
            transition: transform 0.3s ease-out;
            overflow: hidden;
        }

        /* The Spinning Gradient Border */
        .card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, #00f3ff, #ff00ff);
            animation: border-spin 4s linear infinite;
            z-index: -2;
            opacity: 0.6; /* Softened so it doesn't overpower the background */
        }

        .card-inner {
            position: relative;
            width: 100%; height: 100%;
            /* High blur, low opacity = premium glass */
            background: rgba(5, 5, 10, 0.4); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 14px;
            padding: 1.25rem;
            display: flex; flex-direction: column;
            overflow: hidden;
            z-index: 1;
        }

        /* The Flashlight Mouse Glow */
        .card-inner::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(
                800px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), 
                rgba(255, 255, 255, 0.1),
                transparent 40%
            );
            z-index: 2; pointer-events: none;
            opacity: 0; transition: opacity 0.3s;
        }
        .card:hover .card-inner::before { opacity: 1; }

        @keyframes border-spin { 100% { transform: rotate(360deg); } }

        /* === 5. TYPOGRAPHY & GLITCH === */
        .card-label {
            position: relative;
            font-size: 0.8rem; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.8); margin-bottom: 1rem;
            transform: translateZ(30px);
            z-index: 5;
            transition: color 0.3s;
        }

        .card:hover .card-label {
            animation: glitch-skew 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
            color: #fff;
            text-shadow: 2px 0 #ff00ff, -2px 0 #00f3ff;
        }

        @keyframes glitch-skew {
            0% { transform: translateZ(30px) skew(0deg); }
            20% { transform: translateZ(30px) skew(-10deg); }
            40% { transform: translateZ(30px) skew(10deg); }
            60% { transform: translateZ(30px) skew(-5deg); }
            80% { transform: translateZ(30px) skew(5deg); }
            100% { transform: translateZ(30px) skew(0deg); }
        }

        /* === 6. CONTENT AREAS === */
        .content-area {
            flex-grow: 1; width: 100%; height: 100%;
            border-radius: 8px; overflow: hidden;
            position: relative; z-index: 3;
            transform: translateZ(20px);
        }

        iframe { width: 100%; height: 100%; border: none; }
        canvas { display: block; width: 100%; height: 100%; }

        /* === 7. NATIVE CSS 3D REACTOR === */
        .reactor-container {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            /* Made container transparent so aurora shows through */
            background: transparent; 
            perspective: 800px;
        }
        .core {
            position: relative; width: 60px; height: 60px;
            transform-style: preserve-3d;
            animation: core-spin 8s infinite linear;
        }
        .ring {
            position: absolute; width: 100%; height: 100%;
            border: 2px solid #00f3ff; border-radius: 50%;
            box-shadow: 0 0 15px #00f3ff, inset 0 0 15px #00f3ff;
        }
        .ring:nth-child(1) { transform: rotateX(45deg) rotateY(0deg); }
        .ring:nth-child(2) { transform: rotateX(45deg) rotateY(60deg); border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff, inset 0 0 15px #ff00ff;}
        .ring:nth-child(3) { transform: rotateX(45deg) rotateY(120deg); }
        .nucleus {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            background: #fff; border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 30px #fff, 0 0 50px #00f3ff;
            animation: pulse 2s ease-in-out infinite alternate;
        }

        @keyframes core-spin { 100% { transform: rotateX(360deg) rotateY(360deg); } }
        @keyframes pulse { 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.8; } }

    </style>
</head>
<body>

    <div class="magical-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="bento-grid" id="grid">
        
        <div class="card">
            <div class="card-inner">
                <div class="card-label">SYS.01 // KINETIC FLUID</div>
                <div class="content-area">
                    <iframe src="https://paveldogreat.github.io/WebGL-Fluid-Simulation/" title="Fluid Sim"></iframe>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-inner">
                <div class="card-label">SYS.02 // DATA STREAM</div>
                <div class="content-area">
                    <canvas id="matrix-canvas"></canvas>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-inner">
                <div class="card-label">SYS.03 // ATMOSPHERE</div>
                <div class="content-area">
                    <iframe src="https://earth.nullschool.net/" title="Earth"></iframe>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-inner">
                <div class="card-label">SYS.04 // QUANTUM CORE</div>
                <div class="content-area reactor-container">
                    <div class="core">
                        <div class="ring"></div>
                        <div class="ring"></div>
                        <div class="ring"></div>
                        <div class="nucleus"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        /* === 1. 3D TILT & FLASHLIGHT EFFECT === */
        const cards = document.querySelectorAll('.card');
        
        cards.forEach(card => {
            const inner = card.querySelector('.card-inner');

            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                inner.style.setProperty('--mouse-x', `${x}px`);
                inner.style.setProperty('--mouse-y', `${y}px`);

                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = ((y - centerY) / centerY) * -3; 
                const rotateY = ((x - centerX) / centerX) * 3;

                card.style.transform = `perspective(1500px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1500px) rotateX(0deg) rotateY(0deg)`;
            });
        });

        /* === 2. NATIVE MATRIX RAIN EFFECT === */
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeMatrix() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeMatrix);
        resizeMatrix();

        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';
        const fontSize = 14;
        let columns = canvas.width / fontSize;
        let drops = [];

        // Re-initialize drops on resize to prevent visual bugs
        function initDrops() {
            columns = canvas.width / fontSize;
            drops = [];
            for (let i = 0; i < columns; i++) { drops[i] = 1; }
        }
        initDrops();
        window.addEventListener('resize', initDrops);

        function drawMatrix() {
            // Clear with high transparency so the aurora shows through the matrix!
            ctx.fillStyle = 'rgba(5, 5, 10, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff00ff'; 
            ctx.font = fontSize + 'px Courier New';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        
        setInterval(drawMatrix, 40);
    </script>
</body>
</html>
